<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="project.css">

</head>

<body>

    <div id="navbar"></div>
    <script src="navbar.js"></script>
    <script src="Project.js"></script>
    <div class="page-transition-wrapper">
        <div class="projects-wrapper">

        <div class="title">
            Projects
        </div>

        <div class="project-list">

            <div class="project-item active"
                data-index="0">

                <div class="bars">

                    <div class="stat">

                        <span>HP</span>

                        <div class="bar">

                            <div class="fill hp-fill"
                                style="width:88%">
                            </div>

                        </div>

                        <span>44</span>

                    </div>

                    <div class="stat">

                        <span class="sp-color">SP</span>

                        <div class="bar">

                            <div class="fill sp-fill"
                                style="width:40%">
                            </div>

                        </div>

                        <span>6</span>

                    </div>

                </div>

            </div>

            <div class="project-item"
                data-index="1">

                <div class="bars">

                    <div class="stat">

                        <span>HP</span>

                        <div class="bar">

                            <div class="fill hp-fill"
                                style="width:70%">
                            </div>

                        </div>

                        <span>47</span>

                    </div>

                    <div class="stat">

                        <span class="sp-color">SP</span>

                        <div class="bar">

                            <div class="fill sp-fill"
                                style="width:30%">
                            </div>

                        </div>

                        <span>9</span>

                    </div>

                </div>

            </div>

            <div class="project-item"
                data-index="2">

                <div class="bars">

                    <div class="stat">

                        <span>HP</span>

                        <div class="bar">

                            <div class="fill hp-fill"
                                style="width:60%">
                            </div>

                        </div>

                        <span>43</span>

                    </div>

                    <div class="stat">

                        <span class="sp-color">SP</span>

                        <div class="bar">

                            <div class="fill sp-fill"
                                style="width:35%">
                            </div>

                        </div>

                        <span>11</span>

                    </div>

                </div>

            </div>

        </div>

        <div class="project-display">

            <div id="project-content"></div>

        </div>

    </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="project.js"></script>

</body>

</html>
